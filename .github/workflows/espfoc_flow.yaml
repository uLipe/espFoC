name: Build
on: push
jobs:
  build:
    name: Test compiling
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    - name: Install dependencies
      run: |
        sudo apt-get install \
          bison \
          ccache \
          flex \
          gcc \
          git \
          gperf \
          libffi-dev \
          libncurses-dev \
          libssl-dev \
          make \
          wget

    - name: Checkout the SDK
      uses: actions/checkout@v2
      with:
        repository: espressif/esp-idf
        path: idf
        submodules: recursive
        ref: release/v5.5

    - name: Build Samples
      run: |
        ./idf/install.sh
        . ./idf/export.sh
        for target in esp32 esp32c6 esp32s3 esp32p4; do
          pushd examples/axis_shell
          idf.py set-target "$target"
          idf.py build
          rm -rf build sdkconfig
          popd
        done
        for example in test_current_sense test_encoder test_inverter test_voltage_path; do
          pushd "examples/test_drivers/${example}"
          idf.py set-target esp32s3
          idf.py build
          rm -rf build sdkconfig
          popd
        done

  unit_tests:
    name: Unit tests (build and run on QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bison ccache flex gcc git gperf libffi-dev libncurses-dev libssl-dev make wget \
          libgcrypt20 libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0

    - name: Checkout ESP-IDF
      uses: actions/checkout@v4
      with:
        repository: espressif/esp-idf
        path: idf
        submodules: recursive
        ref: release/v5.5

    - name: Install ESP-IDF and pytest-embedded
      run: |
        ./idf/install.sh --enable-ci
        . ./idf/export.sh

    - name: Install QEMU for ESP32
      run: |
        . ./idf/export.sh
        python $IDF_PATH/tools/idf_tools.py install qemu-xtensa

    - name: Build unit test runner (esp32 for QEMU)
      run: |
        . ./idf/export.sh
        cd examples/unit_test_runner
        idf.py set-target esp32
        idf.py -D TEST_COMPONENTS=espFoC build

    - name: Run unit tests on QEMU
      timeout-minutes: 15
      env:
        IDF_PATH: ${{ github.workspace }}/idf
      run: |
        . ./idf/export.sh
        pip install pexpect
        cd examples/unit_test_runner
        python run_unit_tests_qemu.py

    - name: Shell QEMU smoke (axis_shell FITL)
      timeout-minutes: 10
      run: |
        . ./idf/export.sh
        cd examples/axis_shell
        idf.py set-target esp32
        idf.py build
        python3 ../../scripts/run_shell_qemu.py

    - name: Build unit test runner (all HW targets compile check)
      run: |
        . ./idf/export.sh
        cd examples/unit_test_runner
        for target in esp32c6 esp32s3 esp32p4; do
          idf.py set-target "$target"
          idf.py -D TEST_COMPONENTS=espFoC build
          rm -rf build sdkconfig
        done

    - name: Run unit tests on device
      env:
        IDF_PATH: ${{ github.workspace }}/idf
      run: |
        . ./idf/export.sh
        cd examples/unit_test_runner
        idf.py set-target esp32s3
        idf.py -D TEST_COMPONENTS=espFoC build
        pytest pytest_espfoc_unittest.py -m generic -v
      continue-on-error: true
